<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DOM 기초 실습</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        .highlight { background-color: yellow; padding: 2px 5px; }
        .box {
            background-color: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1 id="main-title">DOM 실습 페이지</h1>

    <div class="box">
        <h2>자기소개</h2>
        <p id="name">이름: 홍길동</p>
        <p id="hobby">취미: 코딩 배우기</p>
    </div>

    <div class="box">
        <h2>좋아하는 과일</h2>
        <ul>
            <li class="fruit"> 사과</li>
            <li class="fruit"> 바나나</li>
            <li class="fruit"> 딸기</li>
        </ul>
    </div>

    <div class="box">
        <h2>오늘의 한마디</h2>
        <p class="message">JavaScript로 DOM을 배우고 있어요!</p>
    </div>

    <!-- JavaScript는 body 맨 아래에! -->
    <script src="homework.js"></script>
</body>
</html>
