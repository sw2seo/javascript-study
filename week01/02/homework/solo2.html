<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원가입</h1>
    <form>
        <p>
        <label>이름 : </label><br>
        <input type="text" placeholder="이름">
        </p>

        <p>
        <label>이메일 : </label><br>
        <input type="email" placeholder="이메일주소">
        </p>

        <p>
        <input type="password" placeholder="비밀번호">
        </p>

        <p>
        <label>성별 : </label><br>
        <input type="radio" name="gender" value="mail">남성
        <input type="radio" name="gender" value="femail">여성
        </p>

        <p>
            <label>관심분야 : </label><br>
            <input type="checkbox" value="html"> HTML
            <input type="checkbox" value="css"> CSS
            <input type="checkbox" value="js"> JavaScript
        </p>

        <p>
            <label>자기소개 :</label><br>
            <textarea rows="5" cols="40" placeholder="간단한 자기소개를 작성해주세요"></textarea>
        </p>

        <button type="submit">가입하기</button>
    </form>    
</body>
</html>
