<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>
</head>

<body>
    <div>
        <h1>과자먹으러가자</h1>
        <p>최고의 상품을 만나보세요!</p>
    </div>
    <div>
        <h2>인기상품</h2>
        <p><strong>상품 1 : </strong>맛있는과자</p>
        <p><strong>상품 2: </strong>시원한음료</p>
    </div>
    <div>
        <p><strong>연락처 : </strong>010-5054-2678</p>
        <p><strong>주소 : </strong> 인천 서구 어딘가</p>
    </div>

    <P><span style="color: blue;">이번주 최고의 간식 :</span><span style="background-color: yellow;">맛동산</span></P>
    </p>

    <table>
        <tr>
            <th>과자</th>
            <th>아이스크림</th>
            <th>음료수</th>
        </tr>
        <tr>
            <td>맛동산</td>
            <td>엔초</td>
            <td>포카리</td>
        </tr>
        <tr>
            <td>칸초</td>
            <td>뽕따</td>
            <td>파워에이드</td>
        </tr>
    </table>

    <h2>로그인</h2>
    <form>
        <label>아이디 : </label>
        <input type="text" placeholder="아이디를 입력하세요">
        <br><br>
        <label>이메일 : </label>
        <input type="email" placeholder="email@gmail.com">
        <br><br>
        <label>비밀번호 : </label>
        <input type="password" placeholder="비밀번호를 입력하세요">
        <br><br>
        <label>먹고싶은 음식 : </label><br>
        <textarea rows="4" cols="40"
        placeholder="먹고싶은 음식을 작성해주세요"></textarea>
        <label>좋아하는음식 : </label>
        <select>
            <option value="">선택하세요</option>
            <option value="Korean food">한식</option>
            <option value="Amerian food">양식</option>
            <option value="Japanise food">일식</option>
            <option value="Chinise food">중식</option>
        </select>
        <br><br>
        <button type="submit">가입하기</button>
    </form>   
</body>

</html>
