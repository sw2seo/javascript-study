<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
</head>
<body>
  <h1>회원가입</h1>

  <form>
    <!-- 이름 -->
    <p>
      <label>이름:</label><br>
      <input type="text" placeholder="이름">
    </p>

    <!-- 이메일 -->
    <p>
      <label>이메일:</label><br>
      <input type="email" placeholder="이메일 주소">
    </p>

    <!-- 비밀번호 -->
    <p>
      <label>비밀번호:</label><br>
      <input type="password" placeholder="비밀번호">
    </p>

    <!-- 성별 선택 (라디오 버튼 — 하나만 선택 가능) -->
    <p>
      <label>성별:</label><br>
      <!-- name이 같으면 하나만 선택돼요 -->
      <input type="radio" name="gender" value="male"> 남성
      <input type="radio" name="gender" value="female"> 여성
    </p>

    <!-- 관심 분야 (체크박스 — 여러 개 선택 가능) -->
    <p>
      <label>관심 분야:</label><br>
      <input type="checkbox" value="html"> HTML
      <input type="checkbox" value="css"> CSS
      <input type="checkbox" value="js"> JavaScript
    </p>

    <!-- 자기소개 -->
    <p>
      <label>자기소개:</label><br>
      <textarea rows="5" cols="40" placeholder="간단한 자기소개를 작성해주세요"></textarea>
    </p>

    <!-- 가입 버튼 -->
    <button type="submit">가입하기</button>
  </form>
</body>
</html>
