<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- /* 4가지 방법으로 쓸 수 있어요 */

    /* 1. 값 1개: 상하좌우 모두 같은 값 */
    padding: 20px; /* 위 20, 오른쪽 20, 아래 20, 왼쪽 20 */

    /* 2. 값 2개: 상하 / 좌우 */
    padding: 10px 20px; /* 위아래 10, 좌우 20 */

    /* 3. 값 3개: 위 / 좌우 / 아래 */
    padding: 10px 20px 30px; /* 위 10, 좌우 20, 아래 30 */

    /* 4. 값 4개: 위 / 오른쪽 / 아래 / 왼쪽 (시계방향!) */
    padding: 10px 20px 30px 40px; /* 위 10, 오른쪽 20, 아래 30, 왼쪽 40 */

    /* 개별 지정도 가능 */
    padding-top: 10px; /* 위쪽만 */
    padding-right: 20px; /* 오른쪽만 */
    padding-bottom: 30px; /* 아래쪽만 */
    padding-left: 40px; /* 왼쪽만 */

    /* margin도 똑같은 방식! */
    margin: 10px 20px; /* 위아래 10, 좌우 20 */ -->
    <style>
        .box {
            /* contnt 영역 크기 */
            width: 200px;
            height: 100px;

            /* padding : 내용과 테두리 사이의 안쪽 여백 */
            padding: 20px;

            /* border : 테두리 */
            /* 3px 두께, 실선, 짙은회색 */
            border: 3px solid #333;

            /* margin : 다른 요소와의 바깥 거리 */
            margin: 30px;

            /* 배경색을 넣으면 content + padding 영역의 색이 채워짐 */
            background-color: #e8f4f8;
        }
    </style>
</head>

<body>
    <div class="box">나도 상자입니다!</div>
    <div class="box">나도 상자입니다!</div>

</body>

</html>
