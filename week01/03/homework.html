<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red-text {
            color: red;
        }

        .blue-text {
            color: #0909ff;
        }

        .custom-text {
            color: rgb(100, 50, 200);
        }

        .yellow-bg {
            background-color: yellow;
        }

        .dark-section {
            background-color: #333333;
            color: white;
        }

        .small {
            font-size: 12px;
        }

        .large {
            font-size: 24px;
        }

        body {
            font-family: 'Noto Sans KR', '맑은고딕', 'sans-serif';
        }

        .code-style {
            font-family: 'Courier', courier, monospace;
        }

        .thin {
            font-weight: 300;
        }

        .bold {
            font-weight: 800;
        }

        .also-bold {
            font-weight: bold;
        }

        .left {
            text-align: left;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        .box-small {
            width: 200px;
            height: 100px;
            background-color: lightblue;
        }

        .box-large {
            width: 400px;
            height: 200px;
            background-color: lightcoral;
        }

        .box-half {
            width: 50%;
            height: 150px;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <p>그냥문단 (검정색)</p>
    <P class="red-text">빨간색문단</P>
    <p class="blue-text">파란색문단</p>

    <p class="yellow-bg">노란색 배경문단</p>
    <div class="dark-section">
        <p>어두운 배경에 하얀글씨</p>
    </div>

    <p class="small">작은 글씨에요</p>
    <p class="large code-style">큰 글씨에요</p>

    <p class="thin">가는 글씨</p>
    <p class="bold">굵은 글씨</p>
    <p class="also-bold">다른 굵은글씨</p>

    <p class="left">왼쪽정렬</p>
    <p class="center">가운데정렬</p>
    <p class="right">오른쪽정렬</p>

    <div class="box-small">작은상자</div>
    <div class="box-large">큰 상자</div>
    <div class="box-half">절반 너비상자</div>
</body>
</html>
