<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서상원 이력서</title>
    <link rel="stylesheet" href="homeworkstyle.css">
</head>
<body>
    <header id="top-header">
        <h1>서상원</h1>
        <p class="subtitle">프론트엔드 개발자를 꿈꾸는 초보 개발자</p>
    </header>

    <nav>
    <a href="#about">소개</a> |
    <a href="#skills">기술 스택</a> |
    <a href="#education">학력</a> |
    <a href="#contact">연락처</a>
  </nav>

  <main>
    <section id="about">
        <h2>자기소개</h2>
        <>안녕하세요! 웹 개발에 관심이 많은 <span class="highlight">홍길동</span>입니다.
        현재 HTML, CSS를 열심히 배우고 있으며,
        <span class="highlight">나만의 웹사이트</span>를 만드는 것이 목표입니다.
    </p>
    </section>

    <section>
      <h2>기술스택</h2>
      <table>
        <tr>
          <th>기술</th>
          <th>수준</th>
          <th>학습 상태</th>
        </tr>
        <tr>
          <td>HTML</td>
          <td>입문</td>
          <td class="learning">학습 중</td>
        </tr>
          <tr>
            <td>CSS</td>
            <td>입문</td>
            <td class="learning">학습 중</td>
          </tr>
          <tr>
            <td>JavaScript</td>
            <td>-</td>
            <td class="planned">예정</td>
          </tr>
      </table>
    </section>
    <section id="contact">
      <h2>연락처</h2>
      <form>
        <p>
          <label>이름:</label><br>
          <input type="text" placeholder="이름을 입력하세요" class="input-field">
          </p>
          <p>
            <label>메시지:</label><br>
            <textarea rows="4" cols="40" placeholder="메시지를 입력하세요" class="input-field"></textarea>
          </p>
          <button type="submit" class="btn">보내기</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 서상원. 웹 개발 공부 중입니다!</p>
  </footer>
</body>
</html>
