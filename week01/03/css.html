<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 글자색 바꾸는 방법 */
        .red-text {
            /* 색 이름으로 정의 */
            color: red;
        }

        .blue-text {
            /* 16진수 색상코드 (제일많이 사용됨) */
            color: #0909ff;
        }

        .custom-text {
            /* RGB 값으로 설정 (빨강, 초록, 파랑) */
            color: rgb(100, 50, 200);
        }

        /* background-color 배경색상 */
        .yellow-bg {
            background-color: yellow;
        }

        .dark-section {
            background-color: #333333;
            color: white;
        }

        /* font-size : 글자의 크기를 정해요 */
        /* px(픽셀) = 화면의 점 하나 크기 */
        .small {
            font-size: 12px;
        }

        .large {
            font-size: 24px;
        }

        /* font-famaily 글꼴(폰트) 변경 */
        /* 여러 개 옵션을 써놓으면 앞에서부터확인해서 있는 걸 사용(백업개념) */
        
        body {
            font-family: 'Noto Sans KR', '맑은고딕', 'sans-serif';
        }

        .code-style {
            font-family: 'Courier', courier, monospace;
        }

        /* font-weight 글자의 굵기 정하기 */
        .thin {
            font-weight: 300;
        }
        .bold {
            font-weight: 800;
        }
        .also-bold {
            font-weight: bold;
        }

        /* text-align : 글자의 왼쪽/가운데/오른쪽으로 정렬해요 */
        .left {
            text-align: left;
        }
        .center {
            text-align: center;
        }
        .right {
            text-align: right;
        }

        /* 영역의 크기 바꾸기 */
        /* width : 너비(가로크기) */
        /* height : 높이 (세로크기) */
        .box-small {
            width: 200px;
            height: 100px;
            background-color: lightblue;
        }
        .box-large {
            width: 400px;
            height: 200px;
            background-color: lightcoral;
        }
        /* %로 지정하면 부모 요소 대비 비율로 적용됨 */
        .box-half {
            width: 50%;
            height: 150px;
            background-color: lightgreen;
        }

    </style>
</head>

<body>
    <P>그냥문단(검정색)</P>
    <p class="red-text">빨간색 문단</p>
    <p class="blue-text">파란색 문단</p>

    <p class="yellow-bg">노란색 배경문단</p>
    <div class="dark-section">
        <p>어두운 배경에 하얀 글씨</p>
    </div>

    <p class="small">작은 글씨에요</p>
    <p class="large code-style">큰 글씨에요</p>

    <p class="thin">가는 글씨</p>
    <p class="bold">굵은 글씨</p>
    <p class="also-bold">다른 굵은 글씨</p>

    <p class="left">왼쪽정렬</p>
    <p class="center">가운데정렬</p>
    <p class="right">오른쪽정렬</p>

    <div class="box-small">작은 상자</div>
    <div class="box-large">큰 상자</div>
    <div class="box-half">절반 너비 상자</div>
</body>

</html>
