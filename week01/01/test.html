<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- width(너비)와 height(높이) 속성으로 크기를 조절할 수 있어요 -->
    <!-- 단위는 픽셀(px)이에요 -->
    <img src="https://picsum.photos/300/200" alt="크기 조절된 이미지" width="300" height="200">

    <!-- width(너비)와 height(높이) 속성으로 크기를 조절할 수 있어요 —> -->
    <!-- 단위는 픽셀(px)이에요 -->
    <img src="https://picsum.photos/300/200" alt="크기 조절된 이미지" width="300" height="200">
    <!-- img 태그: 이미지를 넣어요   -->
    <!-- src 속성: 이미지 파일의 경로(주소)예요 (source의 약자) -->
    <!-- alt 속성: 이미지가 안 보일 때 대신 보여줄 텍스트예요 (alternative의 약자) -->
    <!-- img 태그는 br처럼 닫는 태그가 없어요! -->
    <img src="https://picsum.photos/300/200" alt="예시 이미지">

    <!-- a 태그: 링크를 만들어요 -->
    <!-- href 속성(attribute)에 이동할 주소(URL)를 넣어요 -->
    <a href="https://www.google.com">구글로 이동하기</a>

    <!-- ol: 순서가 있는 목록 (자동으로 번호가 붙어요) -->
    <ol>
        <li>계란을 깨뜨린다</li>
        <li>프라이팬에 기름을 두른다</li>
        <li>계란을 부친다</li>
    </ol>

    <!-- ul: 순서가 없는 목록 (동그란 점이 앞에 붙어요) 많이쓰는편 -->
    <ul>
        <!-- li: 목록의 각 항목이에요 -->
        <li>사과</li>
        <li>바나나</li>
        <li>딸기</li>
    </ul>

    <!-- strong 태그: 글씨를 굵게(bold) 만들어요 — '중요한 내용'이라는 의미예요 -->
    <p>이 부분은 <strong>아주 중요한 내용</strong>이에요.</p>

    <!-- em 태그: 글씨를 기울여요(italic) — '강조하는 내용'이라는 의미예요 -->
    <!-- em은 emphasis(강조)의 약자예요 -->
    <p>이 부분은 <em>강조하는 내용</em>이에요.</p>

    <!-- 두 개를 동시에 쓸 수도 있어요! -->
    <p>이 부분은 <strong><em>굵고 기울어진 내용</em></strong>이에요.</p>

    <p>
        첫 번째 줄이에요.<br>
        두 번째 줄이에요.<br>
        세 번째 줄이에요.
    </p>

    <!-- h1: 가장 큰 제목 (한 페이지에 보통 하나만 사용해요) -->
    <h1>가장 큰 제목 (h1)</h1>

    <!-- h2: 두 번째로 큰 제목 (섹션 제목으로 많이 써요) -->
    <h2>두 번째 제목 (h2)</h2>

    <!-- h3: 세 번째 크기의 제목 -->
    <h3>세 번째 제목 (h3)</h3>

    <!-- h4: 네 번째 크기의 제목 -->
    <h4>네 번째 제목 (h4)</h4>

    <!-- h5: 다섯 번째 크기의 제목-->
    <h5>다섯 번째 제목 (h5)</h5>

    <!— h6: 가장 작은 제목 —>
        <h6>가장 작은 제목 (h6)</h6>

</body>

</html>
