<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- viewport(뷰포트) 사용자가 웹페이지를 보는 영역입니다(브라우저의 창의 크기) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
  해석:
  width=device-width  → 뷰포트 너비를 기기 화면 너비에 맞춰라
  initial-scale=1.0   → 처음 확대/축소 비율을 100%로 해라

  이게 없으면?
  → 모바일에서 데스크탑 버전을 축소해서 보여줌 (글씨 작아짐)

  이게 있으면?
  → 모바일 화면 너비에 맞춰서 보여줌 (글씨 정상 크기)
-->
    <title>Document</title>
</head>

<body>

</body>

</html>
