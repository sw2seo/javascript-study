<!-- Font Awesome 아이콘 사용법 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이콘 예제</title>

    <!-- ★ STEP 1: <head>에 Font Awesome CDN 링크 넣기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts도 함께 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            padding: 40px;
            background-color: #f5f5f5;
        }

        /* 아이콘은 CSS로 스타일링 가능! */
        .icon-big {
            font-size: 48px;         /* 아이콘 크기 = 글자 크기! */
            color: #3498db;          /* 아이콘 색상 = 글자 색상! */
            margin-right: 15px;      /* 오른쪽 여백 */
        }

        /* 아이콘 + 텍스트 조합 */
        .contact-item {
            display: flex;           /* 가로 배치 */
            align-items: center;     /* 세로 가운데 정렬 */
            gap: 10px;               /* 요소 사이 간격 */
            padding: 10px;
            margin: 10px 0;
            font-size: 18px;
        }

        .contact-item i {
            color: #667eea;          /* 아이콘 색상 */
            width: 25px;             /* 아이콘 너비 고정 (정렬용) */
            text-align: center;      /* 가운데 정렬 */
        }

        /* 아이콘을 넣은 예쁜 버튼 */
        .btn-icon {
            display: inline-flex;    /* 아이콘과 텍스트 나란히 */
            align-items: center;     /* 세로 가운데 */
            gap: 8px;                /* 간격 */
            padding: 12px 24px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 999px;    /* 알약 모양 */
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;    /* 부모 폰트 상속 */
        }

        .btn-icon:hover {
            background-color: #5a6fd6;
        }
    </style>
</head>
<body>
    <h1>Font Awesome 아이콘 예제</h1>

    <h2>기본 아이콘</h2>
    <!-- ★ STEP 2: <i> 태그에 클래스로 아이콘 지정 -->
    <p>
        <i class="fas fa-home icon-big"></i>        <!-- 집 아이콘 -->
        <i class="fas fa-heart icon-big"></i>       <!-- 하트 아이콘 -->
        <i class="fas fa-star icon-big"></i>        <!-- 별 아이콘 -->
        <i class="fas fa-user icon-big"></i>        <!-- 사용자 아이콘 -->
        <i class="fas fa-envelope icon-big"></i>    <!-- 메일 아이콘 -->
    </p>

    <h2>연락처 — 아이콘 + 텍스트</h2>
    <div class="contact-item">
        <i class="fas fa-phone"></i>                <!-- 전화기 아이콘 -->
        <span>010-1234-5678</span>
    </div>
    <div class="contact-item">
        <i class="fas fa-envelope"></i>             <!-- 메일 아이콘 -->
        <span>example@email.com</span>
    </div>
    <div class="contact-item">
        <i class="fas fa-map-marker-alt"></i>       <!-- 위치 아이콘 -->
        <span>서울특별시 강남구</span>
    </div>

    <h2>아이콘 버튼</h2>
    <button class="btn-icon">
        <i class="fas fa-download"></i>             <!-- 다운로드 아이콘 -->
        다운로드
    </button>
    <button class="btn-icon">
        <i class="fas fa-paper-plane"></i>          <!-- 전송 아이콘 -->
        보내기
    </button>
</body>
</html>
