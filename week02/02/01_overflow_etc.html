<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* overflow 예제들 */
        /* 안넘치고넘치고 테스트하기 내용지워서 테스트하기 */

        /* 기본: 넘치면 그냥 삐져나옴 */
        .overflow-visible {
            width: 200px;
            /* 작은 상자 */
            height: 100px;
            border: 2px solid #3498db;
            overflow: visible;
            /* 기본값: 넘치면 그냥 보임 */
        }

        /* 넘치는 부분 잘라내기 — 문 닫기 */
        .overflow-hidden {
            width: 200px;
            height: 100px;
            border: 2px solid #e74c3c;
            overflow: hidden;
            /* 넘치면 잘라서 안 보이게! */
        }

        /* 스크롤바 항상 표시 */
        .overflow-scroll {
            width: 200px;
            height: 100px;
            border: 2px solid #2ecc71;
            overflow: scroll;
            /* 항상 스크롤바 표시 */
        }

        /* 넘칠 때만 스크롤바 표시 — 가장 많이 씀! */
        .overflow-auto {
            width: 200px;
            height: 100px;
            border: 2px solid #f39c12;
            overflow: auto;
            /* 넘칠 때만 스크롤바 (★ 가장 추천!) 제일 많이쓰기도함 */
        }
    </style>
</head>

<body>
    <div class="overflow-visible">
        <!-- <label>안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요</label> -->
    </div>

    <div class="overflow-hidden">
        <label>안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요안녕하세요</label>
    </div>

    <div class="overflow-scroll">

    <div class="overflow-auto">

</body>

</html>
