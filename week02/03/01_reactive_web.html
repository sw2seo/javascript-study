<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.5s, ease;
        }

        .massage {
            font-size: 24px;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* 모바일 미디어 쿼리 */
        body {
            background-color: #e74c3c;
        }
        .massage::after {
            content: "모바일 (768px 이하)";
        }

        /* 태블릿 사이즈 */
        @media (min-width: 768px) {
            body {
                background-color: #f39c12;
            }
            .massage::after {
                content: "태블릿 (768px ~ 1023px)";
            }
        }

        /* 데스크탑 사이즈 */
        @media (min-width: 1024px) {
            body {
                background-color: #2ecc71;
            }
            .massage::after {
                content: "데스크탑 (1024px이상)";
            }
        }
    </style>
</head>
<body>
    <div class="massage">
        현재화면:<br>
        <!-- ::after '가상요소' 기능으로 자동표시됨 -->
    </div>
</body>
</html>
