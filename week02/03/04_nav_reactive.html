<!-- 반응형 네비게이션 바 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 네비게이션 바</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* === 리셋 & 기본 설정 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* === 네비게이션 바 === */
        .navbar {
            background-color: #2c3e50;  /* 어두운 배경 */
            padding: 15px 20px;          /* 안쪽 여백 */
        }

        /* 네비 안의 내용물 (로고 + 메뉴) */
        .nav-content {
            display: flex;               /* 가로 배치 */
            justify-content: space-between; /* 양쪽 끝으로 */
            align-items: center;         /* 세로 가운데 */
            max-width: 1200px;           /* 최대 너비 */
            margin: 0 auto;             /* 가운데 정렬 */
        }

        /* 로고 */
        .logo {
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;       /* 밑줄 제거 */
        }

        .logo i {
            color: #3498db;              /* 아이콘 색상 */
            margin-right: 8px;
        }

        /* 메뉴 목록 */
        .nav-menu {
            display: flex;               /* 가로 배치 */
            list-style: none;            /* 불릿 제거 */
            gap: 30px;                   /* 메뉴 사이 간격 */
        }

        /* 메뉴 링크 */
        .nav-menu a {
            color: #bdc3c7;              /* 밝은 회색 */
            text-decoration: none;       /* 밑줄 제거 */
            font-size: 16px;
            transition: color 0.3     /* 색상 전환 효과 */
        }

        .nav-menu a:hover {
            color: #3498db;              /* 호버 시 파란색 */
        }

        /* === 메인 콘텐츠 === */
        .hero {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ========== 미디어쿼리: 768px 이하 (모바일/태블릿) ========== */
        @media (max-width: 768px) {
            /* 네비: 세로 배치로 변경 */
            .nav-content {
                flex-direction: column;  /* 세로로 쌓기 */
                gap: 15px;               /* 로고와 메뉴 사이 간격 */
            }

            /* 메뉴: 간격 좁히기 */
            .nav-menu {
                gap: 15px;
            }

            .nav-menu a {
                font-size: 14px;         /* 글자 줄이기 */
            }

            /* 히어로 섹션 */
            .hero {
                padding: 60px 20px;      /* 여백 줄이기 */
            }

            .hero h1 {
                font-size: 32px;         /* 제목 크기 줄이기 */
            }

            .hero p {
                font-size: 16px;
            }
        }

        /* ========== 미디어쿼리: 480px 이하 (작은 모바일) ========== */
        @media (max-width: 480px) {
            .nav-menu {
                flex-wrap: wrap;         /* 메뉴 줄바꿈 허용 */
                justify-content: center; /* 가운데 정렬 */
                gap: 10px;
            }

            .hero h1 {
                font-size: 24px;
            }

            .hero p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="#" class="logo">
                <i class="fas fa-code"></i>MyPortfolio
            </a>
            <ul class="nav-menu">
                <li><a href="#">홈</a></li>
                <li><a href="#">소개</a></li>
                <li><a href="#">프로젝트</a></li>
                <li><a href="#">연락처</a></li>
            </ul>
        </div>
    </nav>

    <!-- 히어로 섹션 -->
    <section class="hero">
        <h1>안녕하세요, 홍길동입니다</h1>
        <p>웹 개발을 공부하고 있는 초보 개발자예요. 함께 성장해 나가고 싶습니다!</p>
    </section>
</body>
</html>
