<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 네비게이션 바</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px 20px;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
        }

        .logo i {
            color: #3498db;
            margin-right: 8px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-menu a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: #3498db;
        }

        .hero {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 15px;
            }
            .nav-menu {
                gap: 15px;
            }

            .nav-menu a {
                font-size: 14px;
            }

            .hero {
                padding: 60px 20px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }
            }

            @media (max-width: 480px) {
                .nav-menu {
                    flex-wrap: wrap;
                    justify-content: center;
                    gap: 10px;
                }
            

            .hero h1 {
                font-size: 24px;
            }

            .hero p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="#" class="logo">
                <i class="fas fa-code"></i>myportfolio
            </a>
            <ul class="nav-menu">
                <li><a href="#">홈</a></li>
                <li><a href="#">소개</a></li>
                <li><a href="#">프로젝트</a></li>
                <li><a href="#">연락처</a></li>
            </ul>
            </div>
    </nav>

    <section class="hero">
        <h1>안녕하세요 서상원입니다</h1>
        <p>웹 개발을 공부하고 있는 초보 개발자예요. 함께 성장해 나가고 싶습니다!</p>
        </section>
</body>
</html>
