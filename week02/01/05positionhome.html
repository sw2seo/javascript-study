    <style>
        .image-card {
            position: relative;
            width: 400px;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-card .overlay-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0,7));
        }
    </style>
