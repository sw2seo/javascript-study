<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 200px;
            background-color: #f0f0f0;
            border: 2px dashed #999;
            margin: 20px;
            border-radius: 10px;
        }

        .flex-item {
            width: 80px;
            height: 80px;
            background-color: #667eea;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h2>Flexbox: 가로 가운데 + 세로 가운데 정렬</h2>
    <div class="flex-container">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
    </div>
</body>
</html>
