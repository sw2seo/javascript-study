<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            /* 마법의 시작! 자식들이 나란히 배치됨 */

            /* 1. flex-direction: 배치 방향 */
            flex-direction: row;
            /* 가로 방향 (기본값) → → → */
            /* flex-direction: column;     세로 방향 ↓ ↓ ↓ */

            /* 2. justify-content: 주축(가로) 정렬 */
            justify-content: center;
            /* 가운데로 모이기 */
            /* justify-content: flex-start;     왼쪽 정렬 (기본값) */
            /* justify-content: flex-end;       오른쪽 정렬 */
            /* justify-content: space-between;  양 끝에 붙고, 사이 균등 */
            /* justify-content: space-around;   각 아이템 주변 균등 여백 */
            /* justify-content: space-evenly;   모든 간격 완전 균등 */

            /* 3. align-items: 교차축(세로) 정렬 */
            align-items: center;
            /* 세로 가운데 */
            /* align-items: flex-start;         위쪽 정렬 */
            /* align-items: flex-end;           아래쪽 정렬 */
            /* align-items: stretch;            세로로 꽉 채우기 (기본값) */

            /* 4. gap: 아이템 사이 간격 */
            gap: 20px;
            /* 아이템 사이에 20px 간격 */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">test</div>
        <div class="item">test</div>
        <div class="item">test</div>
        <div class="item">test</div>
    </div>

</body>

</html>
