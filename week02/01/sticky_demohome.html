<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>이미지 위에 텍스트</title>
    <style>
        .image-card {
            position: relative;
            width: 400px;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-card .overlay-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0,7));
            color: white;
            z-index: 2;
        }

        .overlay-text h3 {
            margin: 0;
            font-size: 20px;
        }

        .overlay-text p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="image-card">
        <img src="https://picsum.photos/400/300" alt="풍경 사진">
        <div class="overlay-text">
            <h3>아름다운 풍경</h3>
            <p>position absolute로 이미지 위에 텍스트를 올렸어요</p>
        </div>
    </div>

</body>
</html>
