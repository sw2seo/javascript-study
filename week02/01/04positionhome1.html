<!DOCTYPE html>
<html lang="ko">
<head>
    
    <title>absolute 예제</title>
    <style>
        .parent {
            position: relative;
            width: 400px;
            height: 300px;
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
        }

        .child-absolute {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 50px;
            background-color: #e74c3c;
            color: white;
            text-align: center;
            line-height: 50px;
        }
    </style>
</head>
<body>
    <div class="parent">
        부모영역

    <div class="child-absolute">자식</div>
    
    </div>
</body>
</html>
