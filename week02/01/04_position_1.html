<!-- position: absolute 예제 HTML -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>absolute 예제</title>
    <style>
        /* 부모 요소: 반드시 position을 설정해야 함! */
        .parent {
            position: relative;       /* ★ 이것이 핵심! 부모에 relative 설정 */
            width: 400px;             /* 가로 400px */
            height: 300px;            /* 세로 300px */
            background-color: #ecf0f1; /* 밝은 회색 배경 */
            border: 2px solid #bdc3c7; /* 테두리 */
        }

        /* absolute로 위치를 지정한 자식 요소 */
        .child-absolute {
            position: absolute;       /* 절대 위치! */
            top: 20px;                /* 부모의 위쪽에서 20px 아래 */
            right: 20px;              /* 부모의 오른쪽에서 20px 안쪽 */
            width: 100px;             /* 가로 100px */
            height: 50px;             /* 세로 50px */
            background-color: #e74c3c; /* 빨간색 */
            color: white;             /* 흰색 글자 */
            text-align: center;       /* 가운데 정렬 */
            line-height: 50px;        /* 글자를 세로 가운데로 */
        }
    </style>
</head>
<body>
    <div class="parent">
        부모 영역
        
        <div class="child-absolute">자식</div>
    
    </div>
</body>
</html>
