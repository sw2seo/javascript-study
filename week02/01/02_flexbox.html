<!-- flexbox.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flexbox 실습</title>
    <style>
        /* ============================================ */
        /* Flexbox 기본: 부모에 display: flex를 주면     */
        /* 자식 요소들이 자동으로 가로로 나란히 배치됩니다  */
        /* ============================================ */

        /* 부모 컨테이너 (정리 상자) */
        .flex-container {
            display: flex;               /* Flexbox 활성화! */
            justify-content: center;     /* 가로 방향: 가운데 정렬 */
            align-items: center;         /* 세로 방향: 가운데 정렬 */
            gap: 15px;                   /* 아이템 사이 간격 15px */
            height: 200px;              /* 컨테이너 높이 (세로 정렬 확인용) */
            background-color: #f0f0f0;  /* 배경색: 연한 회색 */
            border: 2px dashed #999;    /* 테두리: 점선 */
            margin: 20px;               /* 바깥 여백 */
            border-radius: 10px;        /* 모서리 둥글게 */
        }

        /* 자식 아이템 (상자 안의 물건) */
        .flex-item {
            width: 80px;                /* 가로 80px */
            height: 80px;               /* 세로 80px */
            background-color: #667eea;  /* 보라색 배경 */
            color: white;               /* 흰색 글자 */
            display: flex;              /* 아이템 안의 텍스트도 가운데 정렬! 자식요소한테 적용 */
            justify-content: center;    /* 텍스트 가로 가운데 */
            align-items: center;        /* 텍스트 세로 가운데 */
            border-radius: 10px;        /* 모서리 둥글게 */
            font-weight: bold;          /* 글자 굵게 */
            font-size: 18px;            /* 글자 크기 */
        }
    </style>
</head>
<body>
    <h2>Flexbox: 가로 가운데 + 세로 가운데 정렬</h2>
    <div class="flex-container">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
    </div>
</body>
</html>
